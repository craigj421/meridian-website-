backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: builds
    label: Builds
    folder: content/builds
    create: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Slug, name: slug, widget: string }
      - label: Status
        name: status
        widget: select
        options: [in-progress, shipped, paused]
      - { label: Date Started, name: date_started, widget: date, format: YYYY-MM-DD }
      - { label: Date Shipped, name: date_shipped, widget: date, format: YYYY-MM-DD, required: false }
      - { label: Hero Image, name: hero_image, widget: image, required: false }
      - { label: Tags, name: tags, widget: list }
      - { label: Pinned, name: pinned, widget: boolean, default: false, required: false }
      - label: Devlog
        name: devlog
        widget: list
        required: false
        fields:
          - { label: Date, name: date, widget: date, format: YYYY-MM-DD }
          - { label: Content, name: content, widget: text }
      - { label: Body, name: body, widget: markdown }

  - name: journey
    label: Journey
    folder: content/journey
    create: true
    slug: "{{date}}-{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: date, format: YYYY-MM-DD }
      - label: Category
        name: category
        widget: select
        options: [health, build, milestone]
      - { label: Description, name: description, widget: text }
      - { label: Body, name: body, widget: markdown, required: false }
